name: Android CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Build mode'
        required: true
        default: 'validate'
        type: choice
        options:
          - validate
          - release
      version:
        description: 'Version (for release mode, e.g., 0.0.8)'
        required: false
        type: string

jobs:
  validate:
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'validate')
    runs-on: ubuntu-latest
    concurrency:
      group: validate-${{ github.event.pull_request.number || github.run_id }}
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build

      - name: Run Spotless check
        run: ./gradlew spotlessCheck

  release:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'release')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Get version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            version="${GITHUB_REF#refs/tags/v}"
            should_publish="true"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            version="${{ github.event.inputs.version }}"
            should_publish="true"
          else
            version="$(git rev-parse --short HEAD)"
            should_publish="false"
          fi

          echo "VERSION=$version" >> "$GITHUB_OUTPUT"
          echo "SHOULD_PUBLISH=$should_publish" >> "$GITHUB_OUTPUT"

      - name: Decode keystore
        if: env.KEYSTORE_BASE64 != ''
        shell: bash
        run: echo "$KEYSTORE_BASE64" | base64 -d > app/release.keystore

      - name: Build signed release APK
        if: env.KEYSTORE_BASE64 != ''
        shell: bash
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$PWD/app/release.keystore \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      - name: Build unsigned release APK
        if: env.KEYSTORE_BASE64 == ''
        run: ./gradlew assembleRelease

      - name: Rename APK with version
        shell: bash
        run: |
          apk="$(find app/build/outputs/apk/release -name '*.apk' | head -n 1)"
          if [[ -z "$apk" ]]; then
            echo "No release APK found" >&2
            exit 1
          fi
          mv "$apk" "app/build/outputs/apk/release/screen-translator-${{ steps.version.outputs.VERSION }}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: screen-translator-${{ steps.version.outputs.VERSION }}
          path: app/build/outputs/apk/release/screen-translator-${{ steps.version.outputs.VERSION }}.apk
          if-no-files-found: error

      - name: Create GitHub Release
        if: steps.version.outputs.SHOULD_PUBLISH == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: v${{ steps.version.outputs.VERSION }}
          files: app/build/outputs/apk/release/screen-translator-${{ steps.version.outputs.VERSION }}.apk
          generate_release_notes: true

      - name: Cleanup keystore
        if: always()
        run: rm -f app/release.keystore
