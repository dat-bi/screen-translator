name: Android CI

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Build mode'
        required: true
        default: 'validate'
        type: choice
        options:
          - validate
          - release
      version:
        description: 'Version (for release mode, e.g., 0.0.8)'
        required: false
        type: string

jobs:
  # PR validation - just build and check, no artifact
  validate:
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'validate')
    runs-on: ubuntu-latest
    concurrency:
      group: pr-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew build

    - name: Run Spotless check
      run: ./gradlew spotlessCheck

  # Release build - manual only
  release:
    if: github.event_name == 'workflow_dispatch' && inputs.mode == 'release'
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Get version
      id: version
      run: |
        if [[ -n "${{ inputs.version }}" ]]; then
          echo "VERSION=${{ inputs.version }}" >> $GITHUB_OUTPUT
        elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
          echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
        else
          echo "VERSION=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
        fi

    - name: Build with Gradle
      run: ./gradlew build

    - name: Run Spotless check
      run: ./gradlew spotlessCheck

    - name: Decode Keystore
      if: ${{ env.KEYSTORE_BASE64 != '' }}
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        echo "$KEYSTORE_BASE64" | base64 -d > app/release.keystore

    - name: Build Signed Release APK
      if: ${{ env.KEYSTORE_BASE64 != '' }}
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        ./gradlew assembleRelease \
          -Pandroid.injected.signing.store.file=$PWD/app/release.keystore \
          -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
          -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
          -Pandroid.injected.signing.key.password=$KEY_PASSWORD

    - name: Build Unsigned Release APK
      if: ${{ env.KEYSTORE_BASE64 == '' }}
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      run: ./gradlew assembleRelease

    - name: Rename APK with version
      run: |
        mv app/build/outputs/apk/release/app-release-unsigned.apk \
           app/build/outputs/apk/release/screen-translator-${{ steps.version.outputs.VERSION }}.apk 2>/dev/null || \
        mv app/build/outputs/apk/release/app-release.apk \
           app/build/outputs/apk/release/screen-translator-${{ steps.version.outputs.VERSION }}.apk 2>/dev/null || true

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: screen-translator-${{ steps.version.outputs.VERSION }}
        path: app/build/outputs/apk/release/*.apk

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.version.outputs.VERSION }}
        name: v${{ steps.version.outputs.VERSION }}
        files: app/build/outputs/apk/release/*.apk
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Cleanup Keystore
      if: always()
      run: rm -f app/release.keystore
